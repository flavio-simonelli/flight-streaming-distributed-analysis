networks:
  sae-net:
    driver: bridge
    name: sae-net

services:

    # ---------------------------------------------------------
    # LAYER 1: INFRASTRUCTURE
    # ---------------------------------------------------------

    kafka:
      image: apache/kafka:4.3.1-rc
      container_name: kafka
      ports:
        - "${KAFKA_PORT}:9094"
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094'
        KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka.flight-analysis.local:9092,EXTERNAL://127.0.0.1:${KAFKA_PORT}'
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
        KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
        KAFKA_NUM_PARTITIONS: 1
      networks:
        sae-net:
          aliases:
            - kafka.flight-analysis.local

    init-kafka:
      image: apache/kafka:4.3.1-rc
      container_name: init-kafka
      depends_on:
        - kafka
      networks:
        - sae-net
      entrypoint: [ "/bin/sh", "-c" ]
      command:
        - |
          echo "Waiting for Kafka..."
          until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka.flight-analysis.local:9092 --list > /dev/null 2>&1; do
            sleep 2
          done
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka.flight-analysis.local:9092 --create --if-not-exists --topic flights-stream --replication-factor 1 --partitions 1

    influxdb:
      image: influxdb:3-core
      container_name: influxdb
      user: "0"
      ports:
        - "${INFLUXDB_PORT}:8181"
      environment:
        - INFLUXDB3_AUTH_TOKEN=${INFLUXDB_TOKEN}
        - INFLUXDB3_DATA_DIR=/var/lib/influxdb3/data
      command:
        - influxdb3
        - serve
        - --node-id=node0
        - --object-store=file
        - --data-dir=/var/lib/influxdb3/data
      volumes:
        - influxdb-data:/var/lib/influxdb3/data
      networks:
        sae-net:
          aliases:
            - influxdb.flight-analysis.local

    init-influxdb:
      image: influxdb:3-core
      container_name: init-influxdb
      depends_on:
        - influxdb
      networks:
        - sae-net
      entrypoint: [ "/bin/sh", "-c" ]
      command:
        - |
          echo "Waiting for InfluxDB v3 to respond on port 8181..."
          until influxdb3 show databases --host http://influxdb.flight-analysis.local:8181 --token ${INFLUXDB_TOKEN} > /dev/null 2>&1; do
            echo "InfluxDB is not ready yet, sleeping 2s..."
            sleep 2
          done
          echo "InfluxDB is UP. Creating database ${INFLUXDB_BUCKET}..."
          influxdb3 create database ${INFLUXDB_BUCKET} --host http://influxdb.flight-analysis.local:8181 --token ${INFLUXDB_TOKEN}
          echo "Database created successfully."

    redis:
      image: redis/redis-stack:latest
      container_name: redis-stack
      ports:
        - "${REDIS_PORT}:6379"
        - "8001:8001"
      environment:
        - REDISTIMESERIES_ARGS=RETENTION_POLICY=60000 
      volumes:
        - redis-data:/data
      networks:
        - sae-net

    # ---------------------------------------------------------
    # LAYER 2: PROCESSING
    # ---------------------------------------------------------

    jobmanager:
      image: apache/flink:2.2.1-java21
      container_name: jobmanager
      ports:
        - "${FLINK_PORT}:8081"
      command: jobmanager
      environment:
        - |
          FLINK_PROPERTIES=
          jobmanager.rpc.address: jobmanager
      networks:
        sae-net:
          aliases:
            - flink.flight-analysis.local

    taskmanager:
      image: apache/flink:2.2.1-java21
      container_name: taskmanager
      depends_on:
        - jobmanager
      command: taskmanager
      environment:
        - |
          FLINK_PROPERTIES=
          jobmanager.rpc.address: jobmanager
          taskmanager.numberOfTaskSlots: 2
      networks:
        - sae-net

    # ---------------------------------------------------------
    # LAYER 3: VISUALIZATION
    # ---------------------------------------------------------

    grafana:
      image: grafana/grafana:latest
      container_name: grafana
      ports:
        - "${GRAFANA_PORT}:3000"
      environment:
        - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
        - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS}
      volumes:
        - grafana-data:/var/lib/grafana
      networks:
        - sae-net

volumes:
  influxdb-data:
  redis-data:
  grafana-data:
