networks:
    sae-net:
        driver: bridge
        name: sae-net

services:

    kafka:
      image: apache/kafka:4.3.1-rc
      container_name: kafka
      ports:
        - "9094:9094" # Export port for Go Producer Simulator
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        # Definiamo i listener: uno interno (PLAINTEXT) e uno per l'host esterno (EXTERNAL)
        KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094'
        KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094'
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
        KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
        # Parametri di safe-start per singolo broker
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
        KAFKA_NUM_PARTITIONS: 1
      networks:
        - sae-net

    influxdb:
      image: influxdb:3-core
      container_name: influxdb3-core
      ports:
        - "8181:8181"
      command:
        - influxdb3
        - serve
        - --node-id=node0
        - --object-store=file
        - --data-dir=/var/lib/influxdb3/data
      volumes:
        - influxdb3-data:/var/lib/influxdb3/data
      networks:
        - sae-net

    redis:
      image: redis/redis-stack:latest
      container_name: redis-stack
      ports:
        - "6379:6379"
        - "8001:8001"
      environment:
        - REDISTIMESERIES_ARGS=RETENTION_POLICY=60000 
      volumes:
        - redis-data:/data
      networks:
        - sae-net

    grafana:
      image: grafana/grafana:latest
      container_name: grafana
      ports:
        - "3000:3000"
      environment:
        - GF_SECURITY_ADMIN_USER=admin
        - GF_SECURITY_ADMIN_PASSWORD=admin
      volumes:
        - grafana-data:/var/lib/grafana
      networks:
        - sae-net

volumes:
  influxdb3-data:
  redis-data:
  grafana-data: