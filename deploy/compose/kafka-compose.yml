name: flight-analysis-kafka

services:
  kafka:
    image: apache/kafka:4.3.1-rc
    container_name: kafka
    network_mode: host
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://${NODE_HOSTNAME}:9092,EXTERNAL://${PUBLIC_IP}:9094'
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-1}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-1}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_MIN_ISR:-1}
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: ${KAFKA_PARTITIONS:-1}
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  init-kafka:
    image: apache/kafka:4.3.1-rc
    container_name: init-kafka
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic flights-stream --replication-factor ${KAFKA_REPLICATION_FACTOR:-1} --partitions ${KAFKA_PARTITIONS:-1}
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic flights-results --replication-factor ${KAFKA_REPLICATION_FACTOR:-1} --partitions ${KAFKA_PARTITIONS:-1}
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic flights-q1-results --replication-factor ${KAFKA_REPLICATION_FACTOR:-1} --partitions ${KAFKA_PARTITIONS:-1}
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic flights-q2-1h-results --replication-factor ${KAFKA_REPLICATION_FACTOR:-1} --partitions ${KAFKA_PARTITIONS:-1}
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic flights-q2-6h-results --replication-factor ${KAFKA_REPLICATION_FACTOR:-1} --partitions ${KAFKA_PARTITIONS:-1}
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic flights-q2-global-results --replication-factor ${KAFKA_REPLICATION_FACTOR:-1} --partitions ${KAFKA_PARTITIONS:-1}
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic flights-q3-1d-results --replication-factor ${KAFKA_REPLICATION_FACTOR:-1} --partitions ${KAFKA_PARTITIONS:-1}
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic flights-q3-7d-results --replication-factor ${KAFKA_REPLICATION_FACTOR:-1} --partitions ${KAFKA_PARTITIONS:-1}
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic flights-q3-global-results --replication-factor ${KAFKA_REPLICATION_FACTOR:-1} --partitions ${KAFKA_PARTITIONS:-1}
