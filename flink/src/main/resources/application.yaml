kafka:
  host: "kafka.flight-analysis.local"
  internalPort: 9092
  externalPort: 9094
  inputTopic: "flights-stream"
  sinkTopic: "flights-results"
  groupId: "flink-analysis-group"
  outputTopics:
    q1: "flights-q1-results"
    q2_1h: "flights-q2-1h-results"
    q2_6h: "flights-q2-6h-results"
    q2_global: "flights-q2-global-results"
    q3_1d: "flights-q3-1d-results"
    q3_7d: "flights-q3-7d-results"
    q3_global: "flights-q3-global-results"

flink:
  host: "flink.flight-analysis.local"
  port: 8081
  watermarkDelayMinutes: 10
  allowedLatenessMinutes: 5
  watermarkIdlenessMinutes: 2
  checkpointingEnabled: true
  checkpointIntervalMillis: 60000
  minPauseBetweenCheckpointsMillis: 30000
  checkpointTimeoutMillis: 120000
  globalWindowTriggerHours: 1

  # Checkpoint storage backend.
  # storageType: "hdfs"  → HDFS
  # storageType: "s3"    → Amazon S3
  # storageType: "local" → local filesystem
  # omit / leave empty  → Flink default (in-memory/local JobManager FS, NOT fault-tolerant)
  checkpoint:
    # HDFS example :
    # storageType: "hdfs"
    # path: "/flink/checkpoints"
    # hdfs:
    #   namenode: "hdfs://hdfs.flight-analysis.local:54310"
    # S3 example :
    storageType: "s3"
    path: "flink/checkpoints"
    s3:
      bucket: "flink-flight-analysis"
      region: "us-east-1"
      # Leave accessKey/secretKey empty to use the EC2 IAM Instance Profile
      accessKey: ""
      secretKey: ""
