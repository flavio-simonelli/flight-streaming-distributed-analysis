name: Java CI with Maven and Infrastructure

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:dind

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Start Infrastructure and Generate Token
      run: |
        cp example.env .env
        chmod +x setup-infra.sh
        ./setup-infra.sh

        # Load the generated token into the GitHub Actions environment for Maven
        TOKEN=$(grep "INFLUXDB_TOKEN=" .env | cut -d'=' -f2)
        echo "INFLUXDB_TOKEN=$TOKEN" >> $GITHUB_ENV

    - name: Configure local hostnames
      run: |
        # Map the local hostnames expected by application.yaml and simulator
        sudo echo "127.0.0.1 kafka.flight-analysis.local" | sudo tee -a /etc/hosts
        sudo echo "127.0.0.1 flink.flight-analysis.local" | sudo tee -a /etc/hosts
        sudo echo "127.0.0.1 influxdb.flight-analysis.local" | sudo tee -a /etc/hosts

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build and Run Simulator
      run: |
        cd simulator
        # Generate go.sum dynamically since it's not in the repo
        go mod tidy
        go build -o simulator main.go
        
        # Run simulator to populate Kafka
        # MAX_RECORDS=50 limits the records
        # OUTPUT_TYPE=kafka ensures it sends to Kafka instead of just terminal
        # KAFKA_BROKERS matches the hostname mapped in /etc/hosts
        OUTPUT_TYPE=kafka \
        KAFKA_BROKERS=kafka.flight-analysis.local:9094 \
        MAX_RECORDS=50 \
        SPEEDUP_FACTOR=1000000 \
        ./simulator
      env:
        KAFKA_TOPIC: "flights-stream"

    - name: Build and Run Tests with Maven

      run: |
        mvn test -Dtest=SystemIntegrationTest -f flink/pom.xml \
          -DINFLUXDB_TOKEN=${{ env.INFLUXDB_TOKEN }} \
          -DINFLUXDB_ORG="-" \
          -DINFLUXDB_BUCKET="flights-data"

    - name: Stop Infrastructure
      if: always()
      run: docker compose down
