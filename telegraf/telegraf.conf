[agent]
  interval = "5s"
  flush_interval = "5s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = true

# ==========================================
# OUTPUTS
# ==========================================
[[outputs.influxdb_v2]]
  urls = ["http://influxdb.flight-analysis.local:8086"]
  token = "$INFLUXDB_TOKEN"
  organization = "$INFLUXDB_ORG"
  bucket = "$INFLUXDB_RESULTS_BUCKET"
  [outputs.influxdb_v2.tagdrop]
    host = ["*"]

# ==========================================
# INPUTS & PROCESSING
# ==========================================

# --- QUERY 1 ---
[[inputs.kafka_consumer]]
  brokers = ["kafka.flight-analysis.local:9092"]
  topics = ["flights-q1-results"]
  max_undelivered_messages = 1000
  data_format = "json"
  kafka_version = "3.4.0"
  name_override = "flights_q1_results"
  offset = "oldest"
  consumer_group = "telegraf_flights_q1"
  json_time_key = "window_start"
  json_time_format = "unix_ms"
  json_timezone = "UTC"
  tag_keys = ["airline"]

# --- QUERY 2 ---
[[inputs.kafka_consumer]]
  brokers = ["kafka.flight-analysis.local:9092"]
  topics = ["flights-q2-1h-results", "flights-q2-6h-results", "flights-q2-global-results"]
  max_undelivered_messages = 1000
  data_format = "value"
  data_type = "string"
  kafka_version = "3.4.0"
  name_override = "flights_q2_results"
  offset = "oldest"
  consumer_group = "telegraf_flights_q2"
  [inputs.kafka_consumer.tags]
    pipeline = "flight-analysis"

[[processors.starlark]]
  namepass = ["flights_q2_results"]
  source = '''
load("json.star", "json")

def apply(metric):
    raw_json = metric.fields.get("value")
    if not raw_json:
        return metric

    data = json.decode(raw_json)

    # Map metadata to database tags
    metric.tags["rank"] = str(data.get("rank", ""))
    metric.tags["window_type"] = str(data.get("window_type", ""))

    # Cast fields explicitly to prevent schema type mismatches
    metric.fields["origin_airport_id"] = int(data.get("origin_airport_id", 0))
    metric.fields["window_end"] = int(data.get("window_end", 0))
    metric.fields["num_flights"] = int(data.get("num_flights", 0))
    metric.fields["severe_delays"] = int(data.get("severe_delays", 0))
    metric.fields["dep_delay_mean"] = float(data.get("dep_delay_mean", 0.0))
    metric.fields["dep_delay_max"] = float(data.get("dep_delay_max", 0.0))

    # Serialize the nested flights array into a clean single JSON string
    delayed_flights_array = data.get("delayed_flights", [])
    metric.fields["delayed_flights"] = json.encode(delayed_flights_array)

    # Assign window time logic (convert ms to ns)
    window_start_ms = data.get("window_start")
    if window_start_ms:
        metric.time = int(window_start_ms) * 1000000

    metric.fields.pop("value", None)
    return metric
'''

# --- QUERY 3 ---
[[inputs.kafka_consumer]]
  brokers = ["kafka.flight-analysis.local:9092"]
  topics = ["flights-q3-1d-results", "flights-q3-7d-results", "flights-q3-global-results"]
  max_undelivered_messages = 1000
  data_format = "json"
  kafka_version = "3.4.0"
  name_override = "flights_q3_results"
  offset = "oldest"
  consumer_group = "telegraf_flights_q3"
  json_time_key = "window_start"
  json_time_format = "unix_ms"
  tag_keys = ["airline", "window_type", "hour"]
  [inputs.kafka_consumer.tags]
    pipeline = "flight-analysis"

# ==========================================
# TYPE CONVERTERS
# ==========================================
[[processors.converter]]
  namepass = ["flights_q1_results"]
  [processors.converter.fields]
    integer = ["num_flights", "completed", "cancelled", "diverted"]

[[processors.converter]]
  namepass = ["flights_q3_results"]
  [processors.converter.fields]
    integer = ["count", "window_end"]