[agent]
  interval = "5s"
  flush_interval = "5s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

[[outputs.influxdb_v2]]
  urls = ["http://influxdb.flight-analysis.local:8086"]
  token = "$INFLUXDB_TOKEN"
  organization = "$INFLUXDB_ORG"
  bucket = "$INFLUXDB_RESULTS_BUCKET"

[[inputs.kafka_consumer]]
  brokers = ["kafka.flight-analysis.local:9092"]
  topics = ["flights-q1-results", "flights-q2-1h-results", "flights-q2-6h-results", "flights-q2-global-results", "flights-q3-results"]
  max_undelivered_messages = 1000
  data_format = "json"
  kafka_version = "3.4.0"
  name_override = "flight_analysis_results"
  offset = "oldest"
  consumer_group = "telegraf_flights_v2"
  
  # Map JSON fields to InfluxDB
  # Use window_end as the primary timestamp for the metric
  json_time_key = "window_end"
  json_time_format = "unix_ms"
  
  # Tagging for efficient querying in Grafana
  tag_keys = [
    "airline",
    "origin_airport_id",
    "airport_id"
  ]

  # Metadata to distinguish results in InfluxDB
  [inputs.kafka_consumer.tags]
    pipeline = "flight-analysis"
