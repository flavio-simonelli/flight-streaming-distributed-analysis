[agent]
  interval = "5s"
  flush_interval = "5s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = true

[[outputs.influxdb_v2]]
  urls = ["http://influxdb.flight-analysis.local:8086"]
  token = "$INFLUXDB_TOKEN"
  organization = "$INFLUXDB_ORG"
  bucket = "$INFLUXDB_RESULTS_BUCKET"
  [outputs.influxdb_v2.tagdrop]
      host = ["*"]

[[inputs.kafka_consumer]]
  brokers = ["kafka.flight-analysis.local:9092"]
  topics = ["flights-q1-results"]
  max_undelivered_messages = 1000
  data_format = "json"
  kafka_version = "3.4.0"
  name_override = "flights_q1_results"
  offset = "oldest"
  consumer_group = "telegraf_flights_q1"
  json_time_key = "window_start"
  json_time_format = "2006-01-02 15:04:05"
  json_timezone = "UTC"
  tag_keys = ["airline"]

[[inputs.kafka_consumer]]
  brokers = ["kafka.flight-analysis.local:9092"]
  topics = ["flights-q2-1h-results", "flights-q2-6h-results", "flights-q2-global-results"]
  max_undelivered_messages = 1000
  data_format = "json_v2"
  kafka_version = "3.4.0"
  name_override = "flights_q2_results"
  offset = "oldest"
  consumer_group = "telegraf_flights_q2"
  [inputs.kafka_consumer.tags]
    pipeline = "flight-analysis"
  [[inputs.kafka_consumer.json_v2]]
    measurement_name = "flights_q2_results"
    timestamp_path = "window_start"
    timestamp_format = "unix_ms"
    [[inputs.kafka_consumer.json_v2.tag]]
      path = "rank"
      type = "string"
    [[inputs.kafka_consumer.json_v2.tag]]
      path = "window_type"
      type = "string"
    [[inputs.kafka_consumer.json_v2.field]]
      path = "origin_airport_id"
      type = "int"
    [[inputs.kafka_consumer.json_v2.field]]
      path = "window_end"
      type = "int"
    [[inputs.kafka_consumer.json_v2.field]]
      path = "num_flights"
      type = "int"
    [[inputs.kafka_consumer.json_v2.field]]
      path = "severe_delays"
      type = "int"
    [[inputs.kafka_consumer.json_v2.field]]
      path = "dep_delay_mean"
      type = "float"
    [[inputs.kafka_consumer.json_v2.field]]
      path = "dep_delay_max"
      type = "float"
    [[inputs.kafka_consumer.json_v2.field]]
      path = "delayed_flights"
      type = "string"

[[inputs.kafka_consumer]]
  brokers = ["kafka.flight-analysis.local:9092"]
  topics = ["flights-q3-results"]
  max_undelivered_messages = 1000
  data_format = "json"
  kafka_version = "3.4.0"
  name_override = "flights_q3_results"
  offset = "oldest"
  consumer_group = "telegraf_flights_q3"
  json_time_key = "window_start"
  json_time_format = "unix_ms"
  tag_keys = ["airline", "window_type"]
  [inputs.kafka_consumer.tags]
    pipeline = "flight-analysis"